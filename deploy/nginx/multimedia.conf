# =============================================================================
# Portal de Capacitación Mr. Lana — bloque de Nginx para servir multimedia
# protegida (segmentos HLS, manifiestos, miniaturas, documentos privados)
# mediante X-Accel-Redirect, sin exponer nunca la ruta física del NAS al
# navegador.
#
# Este archivo NO es un vhost completo: es el fragmento que se agrega dentro
# del bloque `server { ... }` existente del sitio (junto a las reglas de
# `location /` que ya reenvían a PHP-FPM/Laravel). Ver docs/PROCESAMIENTO_VIDEO.md
# sección 4 para el flujo completo de autorización antes de llegar aquí.
#
# Cómo funciona el flujo completo:
#   1. El navegador pide, por ejemplo, GET /mi-capacitacion/.../segmento/720/720p_12.ts?signature=...
#   2. Laravel (ReproduccionController) autoriza al usuario, valida la
#      asignación al curso, valida la firma temporal de la URL y valida que
#      el segmento pedido ya esté dentro de lo que el usuario puede ver
#      (control de avance, ver docs/PROCESAMIENTO_VIDEO.md sección 3).
#   3. Si todo es válido, Laravel NO lee ni transmite el archivo: responde
#      con el header `X-Accel-Redirect: /protegido-nas/<ruta-real>` y el
#      cuerpo vacío (MediaStorageService::respuesta(), activado con
#      MEDIA_X_ACCEL_REDIRECT=true).
#   4. Nginx intercepta esa respuesta, resuelve `/protegido-nas/...` contra
#      el `location` `internal` de abajo, y sirve el archivo directamente
#      desde disco — sin volver a pasar por PHP-FPM.
#
# El prefijo `/protegido-nas/` (MEDIA_X_ACCEL_INTERNAL_PREFIX) es arbitrario:
# solo debe coincidir entre `config/media.php` y este archivo, y NUNCA debe
# ser alcanzable desde fuera gracias a `internal;`.
# =============================================================================

# -----------------------------------------------------------------------------
# Tipos MIME de HLS (si tu instalación de Nginx no los trae ya en mime.types)
# -----------------------------------------------------------------------------
# Colocar en el bloque http{} principal (nginx.conf), no aquí:
#
# types {
#     application/vnd.apple.mpegurl m3u8;
#     video/mp2t                    ts;
# }

# -----------------------------------------------------------------------------
# Ubicación INTERNAL: el navegador nunca puede pedir esta ruta directamente
# (Nginx responde 404 a cualquier petición externa que la mencione). Solo es
# alcanzable vía X-Accel-Redirect emitido por Laravel.
# -----------------------------------------------------------------------------
location /protegido-nas/ {
    internal;

    # Debe apuntar al mismo directorio raíz que NAS_ROOT en .env (el disco
    # "nas" de config/filesystems.php). Si el NAS está montado por NFS/SMB
    # como carpeta local del servidor, esta ruta es ese punto de montaje.
    alias /mnt/mrlana-capacitacion/;

    # --- Cache control ---
    # Los segmentos .ts y variantes .m3u8 son inmutables una vez generados
    # (el nombre interno es un UUID; un video reprocesado genera archivos
    # nuevos), así que se pueden cachear agresivamente en el navegador/CDN.
    # Los documentos privados (entregas, evidencias) NO deben cachearse
    # públicamente: se distinguen por prefijo de ruta.
    location ~* ^/protegido-nas/hls/ {
        internal;
        alias /mnt/mrlana-capacitacion/hls/;
        add_header Cache-Control "private, max-age=31536000, immutable" always;
    }

    location ~* ^/protegido-nas/(documentos|originales)/ {
        internal;
        alias /mnt/mrlana-capacitacion/$1/;
        add_header Cache-Control "private, no-store" always;
    }

    # --- CORS restringido ---
    # Solo necesario si el reproductor se sirve desde un origen distinto al
    # backend (poco común aquí, pero documentado por si se separa el
    # frontend a un dominio/CDN propio). MEDIA_ALLOWED_ORIGIN debe coincidir
    # con el valor real de producción; nunca usar "*" para contenido privado.
    set $cors_origin "";
    if ($http_origin = "https://capacitacion.mrlana.com") {
        set $cors_origin $http_origin;
    }
    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;

    # --- Timeouts ---
    # Generosos porque un segmento de video puede tardar en transferirse en
    # redes lentas, pero acotados para no dejar conexiones colgadas.
    send_timeout 60s;
}

# =============================================================================
# Carga de video por bloques reanudable (Fase 9)
# =============================================================================
# Cada bloque llega como multipart/form-data en
# POST /multimedia/cargas/{identificador}/bloques. El tamaño de bloque lo
# decide el backend (config('media.carga_resumible.tamano_bloque_mb'),
# MEDIA_CHUNK_SIZE_MB, 8 MB por defecto) — client_max_body_size debe ser al
# menos ese valor + margen (encabezados/metadatos multipart), NUNCA el
# tamaño del video completo, porque el video completo nunca llega en un
# solo request.
location /multimedia/cargas/ {
    client_max_body_size 32m;   # MEDIA_CHUNK_SIZE_MB (8) + margen amplio
    client_body_timeout 120s;
    proxy_read_timeout 120s;
    fastcgi_read_timeout 120s;

    try_files $uri /index.php?$query_string;
}

# La subida directa (documentos/imágenes, sin chunking) sí necesita un
# límite mayor, acorde a MEDIA_MAX_UPLOAD_MB:
location = /multimedia {
    client_max_body_size 2100m;  # MEDIA_MAX_UPLOAD_MB (2048) + margen
    client_body_timeout 300s;
    fastcgi_read_timeout 300s;

    try_files $uri /index.php?$query_string;
}
